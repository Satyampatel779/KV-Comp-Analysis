# KV comp-analysis full stack: FastAPI (api) + Streamlit (ui).
# Reads MONGODB_URI / MONGODB_DB / API_KEY from the local .env (compose auto-loads it).
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      MONGODB_URI: ${MONGODB_URI:?set MONGODB_URI in .env}
      MONGODB_DB: ${MONGODB_DB:-kv_comp_analysis}
      API_KEY: ${API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
    ports:
      - "8000:8000"
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      API_BASE_URL: http://api:8000
      API_KEY: ${API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
